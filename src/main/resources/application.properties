spring.application.name=bank-wallet-rest-api

# Server
server.port=8080

# PostgreSQL Configuration (?? ??????? ????????????)
spring.datasource.url=jdbc:postgresql://localhost:5433/bankdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL Initialization -
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation12345678901234567890
jwt.expiration=86400000

# APILayer Configuration
apilayer.api-key=2b234cc15a1aa2f39dce2ea46880a7de
apilayer.base-url=http://api.exchangeratesapi.io/v1/

# Actuator - Prometheus
management.endpoints.web.exposure.include=prometheus,health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.access.default=unrestricted

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.example.bankwalletrestapi=DEBUG