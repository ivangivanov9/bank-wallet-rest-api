version: '3.8'

services:
  # PostgreSQL база данни
  postgres:
    image: postgres:15-alpine
    container_name: bank-postgres
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass123
    ports:
      - "5432:5432"
    volumes:
      # Persistent volume за данните
      - postgres-data:/var/lib/postgresql/data
      # Автоматично изпълнение на SQL скриптове при стартиране
      - ./src/main/resources:/docker-entrypoint-initdb.d
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Spring Boot приложението
  app:
    build: .
    container_name: bank-wallet-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankdb
      SPRING_DATASOURCE_USERNAME: bankuser
      SPRING_DATASOURCE_PASSWORD: bankpass123
      JWT_SECRET: "mySecretKeyForJWTTokenGenerationAndValidation12345678901234567890"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bank-network
    restart: unless-stopped

networks:
  bank-network:
    driver: bridge

volumes:
  postgres-data: